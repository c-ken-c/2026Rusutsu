                { id:40, name:"Premier Neige", nameEn:"Premier Neige", category:"shop", desc:"飾品、小物", location:"Resort Hotel & Convention", hours:"09:00-20:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"北翼" },
                { id:41, name:"TARU 葡萄酒舖", nameEn:"Wine Shop TARU", category:"shop", desc:"葡萄酒、酒類", location:"Resort Hotel & Convention", hours:"10:00-21:00", fee:"依商品", reservation:"無需預約", age:"需成年", contact:"店內", child:false, building:"北翼" },
                { id:42, name:"The North Face Store", nameEn:"TNF Store", category:"shop", desc:"戶外服飾", location:"Westin Rusutsu", hours:"09:00-20:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"Westin" },
                { id:43, name:"Herringbone", nameEn:"Herringbone", category:"shop", desc:"滑雪用品店", location:"Westin Rusutsu", hours:"09:00-20:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"Westin" },
                { id:44, name:"Winter Tale", nameEn:"Winter Tale", category:"shop", desc:"原創商品", location:"Westin Rusutsu", hours:"09:00-20:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"Westin" },
                { id:45, name:"Welcome 便利店", nameEn:"Welcome Convenience", category:"shop", desc:"唯一便利商店", location:"Westin Rusutsu", hours:"07:00-23:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"Westin" },
                { id:46, name:"Owners", nameEn:"Owners", category:"shop", desc:"滑雪用品店", location:"Westin Rusutsu", hours:"09:00-20:00", fee:"依商品", reservation:"無需預約", age:"無", contact:"店內", child:true, building:"Westin" }
            ];

            // ----- 篩選狀態 -----
            let categoryFilter = 'all';
            let buildingFilter = 'all';
            let searchTerm = '';

            const categoryChips = document.querySelectorAll('#categoryChips .chip');
            const buildingChips = document.querySelectorAll('#buildingChips .chip');
            const searchInput = document.getElementById('searchInput');
            const listContainer = document.getElementById('listContainer');

            // 過濾函數
            function filterItems() {
                return items.filter(item => {
                    // 搜尋過濾
                    if (searchTerm) {
                        const haystack = (item.name + item.nameEn + (item.desc||'') + item.location).toLowerCase();
                        if (!haystack.includes(searchTerm)) return false;
                    }

                    // 類別過濾
                    if (categoryFilter !== 'all') {
                        if (categoryFilter === 'adult') {
                            // 大人：年齡限制不含兒童 或 16+/18+
                            if (item.child === true && !item.age?.includes('16') && !item.age?.includes('18') && !item.age?.includes('大人')) return false;
                        } else if (categoryFilter === 'child') {
                            // 小孩：item.child === true 且不是嚴格成人限制
                            if (item.child !== true) return false;
                            if (item.age?.includes('18') || item.age?.includes('16+')) return false;
                        } else if (item.category !== categoryFilter) {
                            return false;
                        }
                    }

                    // 建築過濾
                    if (buildingFilter !== 'all') {
                        if (buildingFilter === '戶外樂園') {
                            if (!['戶外樂園', '洞爺湖牧場'].includes(item.building)) return false; // 洞爺湖也算戶外
                        } else if (buildingFilter === '其他') {
                            if (!['其他', 'Arena', '洞爺湖牧場', '戶外樂園'].includes(item.building) && item.building !== '北翼' && item.building !== '南翼' && item.building !== 'Westin') return false;
                        } else {
                            if (item.building !== buildingFilter) return false;
                        }
                    }
                    return true;
                });
            }

            // 渲染卡片
            function render() {
                const filtered = filterItems();
                if (filtered.length === 0) {
                    listContainer.innerHTML = '<div class="no-result">沒有符合的項目</div>';
                    return;
                }

                let html = '';
                filtered.forEach(item => {
                    let badgeClass = 'badge';
                    if (item.category === 'shop') badgeClass += ' shop';
                    else if (item.category === 'play') badgeClass += ' activity';
                    else if (item.category === 'facility') badgeClass += ' facility';

                    const resvHtml = item.reservation && !item.reservation.includes('無需') ? `<div class="resv-badge">📌 ${item.reservation}</div>` : '';

                    html += `
                    <div class="card">
                        <div class="card-header">
                            <h3>${item.name}</h3>
                            <span class="${badgeClass}">${item.category==='eat'?'餐廳':(item.category==='play'?'活動':(item.category==='shop'?'商店':'設施'))}</span>
                        </div>
                        <div class="desc">${item.desc || ''} · ${item.location}</div>
                        <div class="meta-grid">
                            <div class="meta-item"><span class="meta-label">⏰時間</span><span class="meta-value">${item.hours}</span></div>
                            <div class="meta-item"><span class="meta-label">💰費用</span><span class="meta-value">${item.fee}</span></div>
                            <div class="meta-item"><span class="meta-label">🧑年齡</span><span class="meta-value">${item.age || '無'}</span></div>
                            <div class="meta-item"><span class="meta-label">📞聯絡</span><span class="meta-value">${item.contact || '—'}</span></div>
                        </div>
                        <div style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px;">
                            ${item.freeForGuest ? '<span class="free-tag">🏨 住宿免費</span>' : ''}
                            ${item.fee.includes('免費') ? '<span class="free-tag">免費</span>' : ''}
                            ${item.child ? '<span class="child-tag">👶 適合小孩</span>' : ''}
                            <span class="building-tag">📍 ${item.building}</span>
                        </div>
                        ${resvHtml}
                    </div>
                    `;
                });
                listContainer.innerHTML = html;
            }

            // 更新active chips
            function updateChips() {
                categoryChips.forEach(chip => {
                    const cat = chip.dataset.category;
                    chip.classList.toggle('active', cat === categoryFilter);
                });
                buildingChips.forEach(chip => {
                    const bld = chip.dataset.building;
                    chip.classList.toggle('active', bld === buildingFilter);
                });
            }

            // 事件監聽：類別
            categoryChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const cat = chip.dataset.category;
                    if (!cat) return;
                    categoryFilter = cat;
                    updateChips();
                    render();
                });
            });

            // 事件監聽：建築
            buildingChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    const bld = chip.dataset.building;
                    if (!bld) return;
                    buildingFilter = bld;
                    updateChips();
                    render();
                });
            });

            // 搜尋
            searchInput.addEventListener('input', (e) => {
                searchTerm = e.target.value.trim().toLowerCase();
                render();
            });

            // 初始化
            updateChips();
            render();
        })();
    </script>
</body>
</html>
